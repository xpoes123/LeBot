<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeBot — Live Demo</title>
<style>
:root {
  --bg:     #1a1b26;
  --bg2:    #24283b;
  --bg3:    #2f3549;
  --border: #3b4261;
  --text:   #c0caf5;
  --dim:    #565f89;
  --blue:   #7aa2f7;
  --purple: #bb9af7;
  --green:  #9ece6a;
  --yellow: #e0af68;
  --orange: #ff9e64;
  --red:    #f7768e;
  --cyan:   #7dcfff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font: 15px/1.6 -apple-system, Segoe UI, sans-serif; min-height: 100vh; }

header {
  padding: 18px 32px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
header h1 { color: var(--blue); font-size: 20px; font-weight: 700; }
header a { color: var(--dim); font-size: 13px; text-decoration: none; margin-left: auto; }
header a:hover { color: var(--purple); }

.main { max-width: 820px; margin: 0 auto; padding: 28px 24px; display: grid; gap: 18px; }

/* Controls */
.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
select, input[type=number] {
  background: var(--bg2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 11px; border-radius: 6px; font-size: 14px;
}
select:focus, input:focus { outline: 2px solid var(--blue); border-color: transparent; }
.ctrl-label { color: var(--dim); font-size: 13px; display: flex; align-items: center; gap: 6px; }
button {
  background: var(--blue); color: #1a1b26; border: none; padding: 8px 16px;
  border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
button:hover { opacity: .85; }
button.sec { background: var(--bg3); color: var(--text); }
button:disabled { opacity: .35; cursor: not-allowed; }

/* Stem display */
.stem-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; min-height: 76px; font-family: 'SF Mono', Consolas, monospace;
  font-size: 14px; line-height: 1.9; word-wrap: break-word;
}
.w-new  { color: var(--yellow); }
.w-old  { color: var(--text); }
.stem-empty { color: var(--dim); font-style: italic; }
.stem-meta { font-size: 12px; color: var(--dim); margin-top: 6px; }

/* Input row */
.input-row { display: flex; gap: 8px; }
.input-row input[type=text] {
  flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 14px; border-radius: 6px; font-size: 15px;
}
.input-row input[type=text]::placeholder { color: var(--dim); }
.input-row input[type=text]:focus { outline: 2px solid var(--blue); border-color: transparent; }

/* State card */
.state-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 22px; display: grid; gap: 13px;
}
.state-card.buzz-active { border-color: var(--yellow); box-shadow: 0 0 0 1px var(--yellow); }

.sr { display: flex; align-items: center; gap: 12px; }
.sl { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; width: 76px; flex-shrink: 0; }
.guess-val { font-size: 19px; font-weight: 700; font-family: 'SF Mono', Consolas, monospace; }
.guess-unk { color: var(--dim); font-style: italic; font-size: 19px; }
.mode-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; background: var(--bg3); color: var(--purple); }
.mode-badge.calc { color: var(--cyan); }

.bar-wrap { flex: 1; background: var(--bg3); border-radius: 4px; height: 7px; position: relative; overflow: visible; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .3s ease, background .3s ease; }
.bar-t { position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--orange); border-radius: 2px; left: 70%; }
.bar-val { color: var(--text); font-size: 13px; font-family: monospace; white-space: nowrap; min-width: 80px; text-align: right; }

.buzz-alert {
  text-align: center; padding: 11px 0; border-radius: 7px;
  font-size: 17px; font-weight: 700; letter-spacing: .06em; color: var(--yellow);
  border: 1px solid var(--yellow); background: rgba(224,175,104,.1);
  display: none;
}
.buzz-alert.show { display: block; }

.thinking { color: var(--dim); font-size: 13px; display: none; }
.thinking.show { display: inline; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.thinking { animation: blink 1.1s infinite; }

/* History */
.hist-head { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { color: var(--dim); font-weight: 500; text-align: left; padding: 0 10px 8px; border-bottom: 1px solid var(--border); }
td { padding: 7px 10px; border-bottom: 1px solid rgba(59,66,97,.35); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr.buzz-row td { background: rgba(224,175,104,.06); }
.mono { font-family: 'SF Mono', Consolas, monospace; }
.tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-left: 5px; }
.tag-buzz { background: rgba(224,175,104,.2); color: var(--yellow); }
.tag-calc { background: rgba(125,207,255,.1); color: var(--cyan); }
.mini-bar { width: 52px; height: 5px; background: var(--bg3); border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 5px; }
.mini-fill { height: 100%; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>LeBot</h1>
  <span style="color:var(--dim);font-size:13px">Science Bowl buzzer demo</span>
  <a href="https://share.djiang.xyz/lebot/">← share hub</a>
</header>

<div class="main">

  <div class="controls">
    <label class="ctrl-label">Category
      <select id="cat-sel" onchange="category=this.value">
        <option>BIOLOGY</option><option>CHEMISTRY</option><option>PHYSICS</option>
        <option>EARTH_SPACE</option><option>MATH</option><option>ENERGY</option><option>OTHER</option>
      </select>
    </label>
    <label class="ctrl-label">Total words <span style="font-size:11px;color:var(--dim)">(optional)</span>
      <input type="number" id="total-words" min="5" max="300" placeholder="auto" style="width:80px"
        oninput="totalWords = this.value ? +this.value : null">
    </label>
    <button class="sec" onclick="resetAll()">Reset</button>
    <span class="thinking" id="spinner">thinking…</span>
  </div>

  <div>
    <div class="stem-box" id="stem-box">
      <span class="stem-empty">Paste words below and click Add Words (or press Enter)…</span>
    </div>
    <div class="stem-meta" id="stem-meta"></div>
  </div>

  <div class="input-row">
    <input type="text" id="word-input"
      placeholder="paste next words (3 at a time, or any amount)…"
      onkeydown="if(event.key==='Enter')addWords()">
    <button id="add-btn" onclick="addWords()">Add Words</button>
  </div>

  <div class="state-card" id="state-card" style="display:none">
    <div class="sr">
      <span class="sl">Guess</span>
      <span id="guess-val" class="guess-val"></span>
      <span id="mode-badge" class="mode-badge"></span>
      <span id="disagree-badge" style="display:none;font-size:11px;padding:2px 7px;border-radius:4px;background:rgba(247,118,142,.15);color:var(--red);margin-left:4px" title=""></span>
    </div>
    <div class="sr">
      <span class="sl">Stability</span>
      <div class="bar-wrap"><div class="bar-fill" id="stab-fill" style="width:0%;background:var(--green)"></div></div>
      <span class="bar-val" id="stab-val"></span>
    </div>
    <div class="sr">
      <span class="sl">P(buzz)</span>
      <div class="bar-wrap">
        <div class="bar-fill" id="p-fill" style="width:0%"></div>
        <div class="bar-t"></div>
      </div>
      <span class="bar-val" id="p-val"></span>
    </div>
    <div class="sr">
      <span class="sl">Heard</span>
      <div class="bar-wrap"><div class="bar-fill" id="frac-fill" style="width:0%;background:var(--purple)"></div></div>
      <span class="bar-val" id="frac-val"></span>
    </div>
    <div class="sr" id="reasoning-row" style="display:none">
      <span class="sl">Thinking</span>
      <span id="reasoning-val" style="color:var(--dim);font-style:italic;font-size:13px;line-height:1.5"></span>
    </div>
    <div class="buzz-alert" id="buzz-alert">⚡ BUZZ</div>
  </div>

  <div id="hist-section" style="display:none">
    <div class="hist-head">History</div>
    <table>
      <thead><tr><th>Words</th><th>Guess</th><th>Stab</th><th>P(buzz)</th></tr></thead>
      <tbody id="hist-body"></tbody>
    </table>
  </div>

</div>

<script>
let words = [], history = [], category = 'BIOLOGY', totalWords = null, firstBuzz = null;

function setLoading(v) {
  document.getElementById('spinner').classList.toggle('show', v);
  document.getElementById('add-btn').disabled = v;
}

function updateStem(newCount) {
  const box = document.getElementById('stem-box');
  if (!words.length) {
    box.innerHTML = '<span class="stem-empty">Paste words below and click Add Words (or press Enter)…</span>';
    document.getElementById('stem-meta').textContent = '';
    return;
  }
  const split = words.length - newCount;
  box.innerHTML = words.map((w, i) =>
    `<span class="${i < split ? 'w-old' : 'w-new'}">${w} </span>`
  ).join('');
  const est = totalWords || words.length * 2;
  document.getElementById('stem-meta').textContent =
    `${words.length} word${words.length !== 1 ? 's' : ''} revealed` +
    (totalWords ? ` / ${totalWords} total` : ` — est. ~${est} total`);
}

function updateState(d) {
  const card = document.getElementById('state-card');
  card.style.display = '';

  const gv = document.getElementById('guess-val');
  const isUnk = !d.guess || d.guess.toUpperCase() === 'UNKNOWN';
  if (isUnk) {
    gv.className = 'guess-unk'; gv.textContent = '—';
  } else {
    gv.className = 'guess-val';
    gv.style.color = d.stability_run >= 3 ? 'var(--green)' : d.stability_run >= 2 ? 'var(--yellow)' : 'var(--text)';
    gv.textContent = d.guess;
  }

  const mb = document.getElementById('mode-badge');
  mb.textContent = d.mode; mb.className = 'mode-badge' + (d.mode === 'calc' ? ' calc' : '');

  const db = document.getElementById('disagree-badge');
  if (d.agrees === false) {
    db.textContent = `⚠ Haiku: ${d.haiku_vote}`;
    db.title = 'Sonnet and Haiku disagree — treat with caution';
    db.style.display = '';
  } else {
    db.style.display = 'none';
  }

  // stability bar (max display = 6)
  const stabPct = Math.min(100, d.stability_run / 6 * 100);
  document.getElementById('stab-fill').style.width = stabPct + '%';
  document.getElementById('stab-val').textContent = `${d.stability_run} run · ${d.churn} unique`;

  // p_buzz bar
  const pColor = d.p_buzz >= .7 ? 'var(--yellow)' : d.p_buzz >= .5 ? 'var(--blue)' : 'var(--dim)';
  const pFill = document.getElementById('p-fill');
  pFill.style.width = (d.p_buzz * 100) + '%';
  pFill.style.background = pColor;
  document.getElementById('p-val').textContent = d.p_buzz.toFixed(2) + (d.p_buzz >= .7 ? ' ≥ T' : '');

  // frac bar
  document.getElementById('frac-fill').style.width = (d.frac * 100) + '%';
  document.getElementById('frac-val').textContent = Math.round(d.frac * 100) + '% heard';

  const rrow = document.getElementById('reasoning-row');
  const rval = document.getElementById('reasoning-val');
  if (d.reasoning) {
    rval.textContent = d.reasoning;
    rrow.style.display = '';
  } else {
    rrow.style.display = 'none';
  }

  const alert = document.getElementById('buzz-alert');
  if (firstBuzz !== null) {
    alert.classList.add('show');
    card.classList.add('buzz-active');
  } else {
    alert.classList.remove('show');
    card.classList.remove('buzz-active');
  }
}

function updateHistory() {
  document.getElementById('hist-section').style.display = '';
  const body = document.getElementById('hist-body');
  body.innerHTML = '';
  [...history].reverse().forEach(h => {
    const tr = document.createElement('tr');
    if (h.buzzes) tr.classList.add('buzz-row');
    const isFirst = h.wordIdx === firstBuzz;
    const pColor = h.p_buzz >= .7 ? 'var(--yellow)' : h.p_buzz >= .5 ? 'var(--blue)' : 'var(--dim)';
    const isUnk = !h.guess || h.guess.toUpperCase() === 'UNKNOWN';
    tr.innerHTML =
      `<td class="mono" style="color:var(--dim)">w${h.wordIdx}</td>` +
      `<td class="mono">${isUnk ? '<span style="color:var(--dim)">—</span>' : h.guess}` +
        (isFirst ? '<span class="tag tag-buzz">BUZZ</span>' : '') +
        (h.mode === 'calc' ? '<span class="tag tag-calc">calc</span>' : '') +
      `</td>` +
      `<td style="color:var(--dim)">${h.stability_run}</td>` +
      `<td><span class="mini-bar"><span class="mini-fill" style="width:${Math.round(h.p_buzz*100)}%;background:${pColor}"></span></span>` +
        `<span class="mono" style="color:${pColor}">${h.p_buzz.toFixed(2)}</span></td>`;
    body.appendChild(tr);
  });
}

async function addWords() {
  const input = document.getElementById('word-input');
  const newWords = input.value.trim().split(/\s+/).filter(Boolean);
  if (!newWords.length) return;

  const prevLen = words.length;
  words = [...words, ...newWords];
  input.value = '';
  updateStem(newWords.length);
  setLoading(true);

  try {
    const total = totalWords || words.length * 2;
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        prefix: words.join(' '),
        category,
        total_words: total,
        history: history.map(h => ({guess: h.guess, mode: h.mode})),
      }),
    });
    const d = await res.json();
    if (d.buzzes && firstBuzz === null) firstBuzz = words.length;
    history.push({wordIdx: words.length, ...d});
    updateState(d);
    updateHistory();
  } catch(e) {
    console.error(e);
  } finally {
    setLoading(false);
    document.getElementById('word-input').focus();
  }
}

function resetAll() {
  words = []; history = []; firstBuzz = null;
  ['state-card','hist-section'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('buzz-alert').classList.remove('show');
  document.getElementById('state-card').classList.remove('buzz-active');
  updateStem(0);
  totalWords = null;
  document.getElementById('total-words').value = '';
  document.getElementById('word-input').focus();
}
</script>
</body>
</html>
