<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeBot — Science Bowl</title>
<style>
:root {
  --bg:     #1a1b26; --bg2:  #24283b; --bg3:   #2f3549;
  --border: #3b4261; --text: #c0caf5; --dim:   #565f89;
  --blue:   #7aa2f7; --purple: #bb9af7; --green: #9ece6a;
  --yellow: #e0af68; --orange: #ff9e64; --red:   #f7768e; --cyan: #7dcfff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font: 14px/1.6 -apple-system, Segoe UI, sans-serif; height: 100vh; display: flex; flex-direction: column; }

/* Header */
header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
header h1 { color: var(--blue); font-size: 18px; font-weight: 700; }
header a { color: var(--dim); font-size: 12px; text-decoration: none; margin-left: auto; }
header a:hover { color: var(--purple); }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 230px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sidebar-head { padding: 14px 16px 10px; color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.sidebar-head span { color: var(--blue); font-size: 12px; }
#q-list { overflow-y: auto; flex: 1; }
.q-item { padding: 10px 16px; border-bottom: 1px solid rgba(59,66,97,.3); cursor: pointer; transition: background .1s; }
.q-item:hover { background: var(--bg2); }
.q-item.active { background: var(--bg2); border-left: 2px solid var(--blue); }
.q-item-stem { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-item-meta { font-size: 11px; color: var(--dim); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
.q-item-del { margin-left: auto; color: var(--dim); opacity: 0; font-size: 13px; padding: 0 2px; background: none; border: none; cursor: pointer; color: var(--red); }
.q-item:hover .q-item-del { opacity: 1; }
.cat-pill { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg3); color: var(--purple); }
.empty-sidebar { padding: 24px 16px; color: var(--dim); font-size: 13px; text-align: center; line-height: 1.8; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Input panel */
.input-panel { padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
textarea {
  width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
  padding: 12px 14px; border-radius: 8px; font: 14px/1.6 -apple-system, Segoe UI, sans-serif;
  resize: vertical; min-height: 72px; max-height: 160px;
}
textarea::placeholder { color: var(--dim); }
textarea:focus { outline: 2px solid var(--blue); border-color: transparent; }
.input-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
select, input[type=number] { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 7px 11px; border-radius: 6px; font-size: 14px; }
select:focus, input[type=number]:focus { outline: 2px solid var(--blue); border-color: transparent; }
.ctrl-label { color: var(--dim); font-size: 12px; display: flex; align-items: center; gap: 6px; }
button { background: var(--blue); color: #1a1b26; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
button:hover { opacity: .85; }
button.sec { background: var(--bg3); color: var(--text); }
button:disabled { opacity: .35; cursor: not-allowed; }
.analyzing-msg { color: var(--dim); font-size: 13px; display: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.analyzing-msg.show { display: inline; animation: blink 1.2s infinite; }

/* Replay panel */
.replay-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0; }

/* Question display */
.q-display { padding: 16px 24px 12px; font-family: 'SF Mono', Consolas, monospace; font-size: 14px; line-height: 2; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.w-upcoming { color: var(--bg3); }
.w-past     { color: var(--dim); }
.w-current  { color: var(--yellow); }
.q-display-empty { padding: 40px 24px; color: var(--dim); text-align: center; line-height: 2; }

/* Replay controls */
.replay-bar { padding: 10px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.replay-bar button { padding: 6px 12px; font-size: 13px; }
.step-ind { color: var(--dim); font-size: 12px; }
.speed-label { color: var(--dim); font-size: 12px; display: flex; align-items: center; gap: 6px; margin-left: auto; }
.speed-label select { padding: 4px 8px; font-size: 12px; }

/* Content area: timeline + detail side by side */
.content-area { display: flex; flex: 1; overflow: hidden; }

/* Timeline */
.timeline-wrap { flex: 1; overflow-y: auto; border-right: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { color: var(--dim); font-weight: 500; text-align: left; padding: 8px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; }
td { padding: 8px 14px; border-bottom: 1px solid rgba(59,66,97,.3); vertical-align: middle; cursor: pointer; }
tr:last-child td { border-bottom: none; }
tr.active-row td { background: var(--bg2); }
tr.buzz-row td { background: rgba(224,175,104,.05); }
tr:hover td { background: rgba(255,255,255,.03); }
.mono { font-family: 'SF Mono', Consolas, monospace; }
.tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.tag-buzz { background: rgba(224,175,104,.2); color: var(--yellow); }
.tag-calc { background: rgba(125,207,255,.1); color: var(--cyan); }
.tag-dis  { background: rgba(247,118,142,.15); color: var(--red); font-size: 10px; }
.mini-bar { width: 48px; height: 5px; background: var(--bg3); border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 5px; }
.mini-fill { height: 100%; border-radius: 3px; }
.snippet-cell { max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--dim); }

/* Step detail card */
.step-detail { width: 300px; overflow-y: auto; padding: 16px 18px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
.step-detail.empty { justify-content: center; align-items: center; color: var(--dim); font-size: 13px; }
.detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; display: grid; gap: 11px; }
.detail-card.buzz-active { border-color: var(--yellow); }
.dr { display: flex; align-items: flex-start; gap: 10px; }
.dl { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; width: 66px; flex-shrink: 0; padding-top: 1px; }
.guess-big { font-size: 16px; font-weight: 700; font-family: 'SF Mono', Consolas, monospace; }
.guess-unk { color: var(--dim); font-style: italic; font-size: 15px; }
.mode-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; background: var(--bg3); color: var(--purple); margin-top: 2px; }
.mode-badge.calc { color: var(--cyan); }
.dis-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(247,118,142,.15); color: var(--red); margin-top: 2px; }
.bar-wrap { flex: 1; background: var(--bg3); border-radius: 4px; height: 6px; position: relative; margin-top: 6px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .25s ease; }
.bar-t { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--orange); border-radius: 2px; left: 70%; }
.bar-val { color: var(--text); font-size: 12px; font-family: monospace; white-space: nowrap; margin-top: 3px; }
.reasoning-text { color: var(--dim); font-size: 12px; line-height: 1.6; font-style: italic; }
.buzz-pill { text-align: center; padding: 8px; border-radius: 6px; font-size: 14px; font-weight: 700; color: var(--yellow); border: 1px solid var(--yellow); background: rgba(224,175,104,.1); letter-spacing: .05em; }
</style>
</head>
<body>

<header>
  <h1>LeBot</h1>
  <span style="color:var(--dim);font-size:13px">Science Bowl buzzer</span>
  <a href="https://share.djiang.xyz/lebot/">← share hub</a>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-head">Saved <span id="q-count"></span></div>
    <div id="q-list"><div class="empty-sidebar">No saved questions yet.<br>Analyze one to get started.</div></div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Input -->
    <div class="input-panel">
      <textarea id="stem-input" placeholder="Paste a Science Bowl question stem here…" rows="3"></textarea>
      <div class="input-row">
        <label class="ctrl-label">Category
          <select id="cat-sel">
            <option>BIOLOGY</option><option>CHEMISTRY</option><option>PHYSICS</option>
            <option>EARTH_SPACE</option><option>MATH</option><option>ENERGY</option><option>OTHER</option>
          </select>
        </label>
        <button id="analyze-btn" onclick="startAnalysis()">Analyze</button>
        <span class="analyzing-msg" id="analyzing-msg">analyzing…</span>
      </div>
    </div>

    <!-- Replay -->
    <div class="replay-panel" id="replay-panel">

      <div class="q-display-empty" id="q-empty">
        Paste a question above and click Analyze.<br>Results save automatically.
      </div>

      <!-- These are hidden until a question is loaded -->
      <div id="replay-content" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">

        <div class="q-display" id="q-display"></div>

        <div class="replay-bar">
          <button class="sec" onclick="goStep(-1)">◀</button>
          <button id="play-btn" onclick="togglePlay()">▶ Play</button>
          <button class="sec" onclick="goStep(1)">▶</button>
          <span class="step-ind" id="step-ind"></span>
          <label class="speed-label">Speed
            <select id="speed-sel" onchange="setSpeed(+this.value)">
              <option value="1200">Slow</option>
              <option value="700" selected>Normal</option>
              <option value="350">Fast</option>
            </select>
          </label>
        </div>

        <div class="content-area">
          <div class="timeline-wrap">
            <table>
              <thead><tr><th>Step</th><th>Words</th><th>Guess</th><th>P(buzz)</th></tr></thead>
              <tbody id="timeline-body"></tbody>
            </table>
          </div>
          <div class="step-detail" id="step-detail">
            <div style="color:var(--dim);font-size:13px;margin:auto">← click a step</div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let current = null;   // {id, stem, category, steps, total_words, timestamp}
let stepIdx = 0;
let playing = false;
let playTimer = null;
let playSpeed = 700;
let saved = JSON.parse(localStorage.getItem('lebot-qs') || '[]');
let activeId = null;

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('q-list');
  document.getElementById('q-count').textContent = saved.length ? `(${saved.length})` : '';
  if (!saved.length) {
    list.innerHTML = '<div class="empty-sidebar">No saved questions yet.<br>Analyze one to get started.</div>';
    return;
  }
  list.innerHTML = saved.map(q => {
    const date = new Date(q.timestamp).toLocaleDateString(undefined, {month:'short', day:'numeric'});
    const buzzStep = q.steps.find(s => s.buzzes);
    const firstGuess = q.steps.find(s => s.guess && s.guess.toUpperCase() !== 'UNKNOWN');
    const preview = firstGuess ? firstGuess.guess : '—';
    return `<div class="q-item${q.id === activeId ? ' active' : ''}" onclick="loadSaved('${q.id}')">
      <div class="q-item-stem">${esc(q.stem.slice(0, 60))}${q.stem.length > 60 ? '…' : ''}</div>
      <div class="q-item-meta">
        <span class="cat-pill">${q.category.slice(0,4)}</span>
        <span>${preview}</span>
        <span>${date}</span>
        <button class="q-item-del" onclick="event.stopPropagation();deleteSaved('${q.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function deleteSaved(id) {
  saved = saved.filter(q => q.id !== id);
  persist();
  renderSidebar();
  if (id === activeId) clearReplay();
}

function loadSaved(id) {
  const q = saved.find(q => q.id === id);
  if (!q) return;
  activeId = id;
  renderSidebar();
  showReplay(q, true);
}

function persist() { localStorage.setItem('lebot-qs', JSON.stringify(saved)); }

// ── Analysis ───────────────────────────────────────────────────────────────
async function startAnalysis() {
  stopPlay();
  const stem = document.getElementById('stem-input').value.trim();
  const category = document.getElementById('cat-sel').value;
  const stride = 1;
  if (!stem) return;

  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('analyzing-msg').classList.add('show');

  try {
    const res = await fetch('/analyze-full', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({stem, category, stride}),
    });
    const data = await res.json();
    if (!data.steps.length) return;

    const q = {id: String(Date.now()), stem, category, timestamp: Date.now(), ...data};
    saved.unshift(q);
    if (saved.length > 50) saved.pop();
    persist();
    activeId = q.id;
    renderSidebar();
    showReplay(q, true);
  } catch(e) {
    console.error(e);
  } finally {
    document.getElementById('analyze-btn').disabled = false;
    document.getElementById('analyzing-msg').classList.remove('show');
  }
}

// ── Replay ─────────────────────────────────────────────────────────────────
function showReplay(q, autoplay) {
  current = q;
  stepIdx = 0;
  document.getElementById('q-empty').style.display = 'none';
  const rc = document.getElementById('replay-content');
  rc.style.display = 'flex';
  rc.style.flexDirection = 'column';
  rc.style.overflow = 'hidden';
  rc.style.flex = '1';
  renderTimeline();
  showStep(0);
  if (autoplay) { setTimeout(() => startPlay(), 400); }
}

function clearReplay() {
  stopPlay();
  current = null;
  activeId = null;
  document.getElementById('replay-content').style.display = 'none';
  document.getElementById('q-empty').style.display = '';
  renderSidebar();
}

function renderTimeline() {
  const body = document.getElementById('timeline-body');
  const words = current.stem.split(' ');
  let prevWidx = 0;
  body.innerHTML = current.steps.map((s, i) => {
    const snippet = words.slice(prevWidx, s.widx).join(' ');
    prevWidx = s.widx;
    const isUnk = !s.guess || s.guess.toUpperCase() === 'UNKNOWN';
    const pColor = s.p_buzz >= .7 ? 'var(--yellow)' : s.p_buzz >= .5 ? 'var(--blue)' : 'var(--dim)';
    const firstBuzz = current.steps.findIndex(x => x.buzzes) === i;
    return `<tr id="row-${i}" class="${s.buzzes ? 'buzz-row' : ''}" onclick="jumpTo(${i})">
      <td class="mono" style="color:var(--dim)">w${s.widx}</td>
      <td class="snippet-cell">${esc(snippet)}</td>
      <td class="mono">${isUnk ? '<span style="color:var(--dim)">—</span>' : esc(s.guess)}
        ${firstBuzz ? '<span class="tag tag-buzz" style="margin-left:4px">BUZZ</span>' : ''}
        ${s.mode === 'calc' ? '<span class="tag tag-calc" style="margin-left:4px">calc</span>' : ''}
        ${s.agrees === false ? '<span class="tag tag-dis" style="margin-left:4px">⚠</span>' : ''}
      </td>
      <td>
        <span class="mini-bar"><span class="mini-fill" style="width:${Math.round(s.p_buzz*100)}%;background:${pColor}"></span></span>
        <span class="mono" style="color:${pColor}">${s.p_buzz.toFixed(2)}</span>
      </td>
    </tr>`;
  }).join('');
}

function showStep(i) {
  stepIdx = i;
  const step = current.steps[i];
  const words = current.stem.split(' ');
  const total = current.total_words;
  const prevWidx = i > 0 ? current.steps[i-1].widx : 0;

  // Question display with word coloring
  document.getElementById('q-display').innerHTML = words.map((w, wi) => {
    const cls = wi >= step.widx ? 'w-upcoming' : wi >= prevWidx ? 'w-current' : 'w-past';
    return `<span class="${cls}">${esc(w)} </span>`;
  }).join('');

  // Step indicator
  document.getElementById('step-ind').textContent = `Step ${i+1} / ${current.steps.length}`;

  // Highlight timeline row
  document.querySelectorAll('.timeline-wrap tr').forEach((r, ri) => {
    r.classList.toggle('active-row', ri === i);
  });
  // Scroll row into view
  const row = document.getElementById(`row-${i}`);
  if (row) row.scrollIntoView({block: 'nearest', behavior: 'smooth'});

  // Step detail card
  renderStepDetail(step);
}

function renderStepDetail(s) {
  const isUnk = !s.guess || s.guess.toUpperCase() === 'UNKNOWN';
  const pColor = s.p_buzz >= .7 ? 'var(--yellow)' : s.p_buzz >= .5 ? 'var(--blue)' : 'var(--dim)';
  const stabColor = s.stability_run >= 3 ? 'var(--green)' : s.stability_run >= 2 ? 'var(--yellow)' : 'var(--text)';

  document.getElementById('step-detail').innerHTML = `
    <div class="detail-card ${s.buzzes ? 'buzz-active' : ''}">
      <div class="dr">
        <span class="dl">Guess</span>
        <div>
          <div class="${isUnk ? 'guess-unk' : 'guess-big'}" style="${isUnk ? '' : `color:${stabColor}`}">${isUnk ? '—' : esc(s.guess)}</div>
          <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">
            <span class="mode-badge ${s.mode === 'calc' ? 'calc' : ''}">${s.mode}</span>
            ${s.agrees === false ? `<span class="dis-badge">⚠ Haiku: ${esc(s.haiku_vote)}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="dr" style="flex-direction:column;gap:4px">
        <div style="display:flex;justify-content:space-between"><span class="dl" style="width:auto">P(buzz)</span><span class="bar-val" style="color:${pColor}">${s.p_buzz.toFixed(2)}${s.p_buzz >= .7 ? ' ≥ T' : ''}</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${s.p_buzz*100}%;background:${pColor}"></div><div class="bar-t"></div></div>
      </div>
      <div class="dr" style="flex-direction:column;gap:4px">
        <div style="display:flex;justify-content:space-between"><span class="dl" style="width:auto">Heard</span><span class="bar-val">${Math.round(s.frac*100)}%</span></div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${s.frac*100}%;background:var(--purple)"></div></div>
      </div>
      <div class="dr">
        <span class="dl">Stability</span>
        <span style="color:var(--dim);font-size:12px">${s.stability_run} run · ${s.churn} unique</span>
      </div>
      ${s.reasoning ? `<div class="dr"><span class="dl">Thinking</span><span class="reasoning-text">${esc(s.reasoning)}</span></div>` : ''}
      ${s.buzzes ? '<div class="buzz-pill">⚡ BUZZ</div>' : ''}
    </div>`;
}

// ── Playback ───────────────────────────────────────────────────────────────
function startPlay() {
  if (!current) return;
  playing = true;
  document.getElementById('play-btn').textContent = '⏸ Pause';
  tick();
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('play-btn').textContent = '▶ Play';
}

function togglePlay() {
  if (playing) { stopPlay(); return; }
  if (current && stepIdx >= current.steps.length - 1) { stepIdx = 0; showStep(0); }
  startPlay();
}

function tick() {
  if (!playing || !current) return;
  if (stepIdx < current.steps.length - 1) {
    showStep(stepIdx + 1);
    playTimer = setTimeout(tick, playSpeed);
  } else {
    stopPlay();
  }
}

function goStep(delta) {
  stopPlay();
  if (!current) return;
  const next = Math.max(0, Math.min(current.steps.length - 1, stepIdx + delta));
  showStep(next);
}

function jumpTo(i) {
  stopPlay();
  showStep(i);
}

function setSpeed(ms) { playSpeed = ms; }

// ── Boot ───────────────────────────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
